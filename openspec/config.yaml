schema: spec-driven

context: |
  Tech stack: Node.js 22+, CommonJS JavaScript (no TypeScript, no external runtime frameworks)
  Architecture: Multi-target plugin/workflow generator producing four targets: claude, vscode, github-copilot, opencode
  Key dirs: scripts/ (build+test+hook logic), skills/ (SDD+utility skills), agents/ (phase prompt templates), hooks/, dist/ (generated output), rules/, commands/, profiles/
  Testing: Node.js native test runner (--test flag), 20 unit/integration test files in scripts/**/*.test.js
  Package manager: npm (no lock file; package.json at root, Node >=22 required)
  Style: Conventional Commits with Spanish imperative subject/body; no AI/model attribution in commits or PRs
  Hooks: SessionStart, PreToolUse, PreCompact, SubagentStop, Stop (configured in hooks/hooks.json)

project:
  name: ospec-workflow
  version: 2.6.0
  status: active

artifact_store:
  mode: openspec
  backend: openspec

strict_tdd: true

testing:
  runner: node
  test_command: "npm test"
  raw_command: "node --test scripts/**/*.test.js"
  framework: "Node.js native test runner (--test flag)"
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: false
    command: null
  quality:
    linter: false
    type_checker: false
    formatter: false

baseline:
  status: done
  domains_pending: []
  domains_done:
    - generator
    - routing
    - hooks
    - skills
    - agents
    - skill-registry
    - install
  stale_domains: []
  last_checked: "2026-06-14T19:00:00Z"

rules:
  foundation:
    - Ask one blocking question at a time
    - Do not generate application code before scaffold/project setup is approved
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    guidelines:
      - Follow existing code patterns
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

routing:
  - name: foundation
    classification: [normal, high-risk]
    conditions:
      project.status: empty
    phases: [sdd-foundation]
    gates: []
    description: "Guided pre-SDD foundation phase for empty projects."
    cost: medium

  - name: federated
    classification: [normal, high-risk]
    conditions:
      artifact_store.backend: workspace-federated
    phases: [sdd-workspace, sdd-propose, sdd-spec, sdd-design, sdd-tasks, sdd-apply, sdd-verify, sdd-archive]
    gates: [impact, clarify]
    description: "Full SDD for federated multi-repo workspaces."
    cost: high

  - name: debug
    classification: [small, normal]
    conditions:
      explicit_debug_intent: "true"
    phases: [sdd-explore, sdd-tasks, sdd-apply, sdd-verify, sdd-archive]
    gates: [4r-review-gate]
    description: "Robust explore-fix flow with verification and archive."
    cost: medium

  - name: brownfield
    classification: [normal, high-risk]
    conditions:
      match: any
      baseline.status: [pending, partial]
      specs_empty_with_code: true
      code_without_specs: true
    phases: [sdd-baseline]
    gates: [brownfield-advisory]
    description: "Advisory-first baseline pass for brownfield repos."
    cost: medium

  - name: refactor
    classification: [small, normal]
    conditions:
      explicit_refactor_intent: "true"
    phases: [sdd-design, sdd-tasks, sdd-apply, sdd-verify, sdd-archive]
    gates: [4r-review-gate]
    description: "Behavior-preserving code refactoring with design, verification, and archiving."
    cost: medium

  - name: hotfix
    classification: [trivial, small]
    conditions:
      explicit_hotfix_intent: "true"
    phases: [sdd-apply, sdd-verify, sdd-archive]
    gates: []
    description: "Emergency patch or trivial change directly applied, verified, and archived."
    cost: low

  - name: standard
    classification: [normal, high-risk]
    conditions:
      project.status: active
    phases: [sdd-propose, sdd-spec, sdd-design, sdd-tasks, sdd-apply, sdd-verify, sdd-archive]
    gates: [clarify, 4r-review-gate]
    description: "Full SDD for normal/high-risk changes on active projects."
    cost: high

  - name: lite
    classification: [trivial, small]
    conditions:
      change.classification: small
    phases: [sdd-propose, sdd-tasks, sdd-apply, sdd-verify, sdd-archive]
    gates: []
    description: "Reduced SDD for trivial/small changes with archiving."
    cost: low

# ---------------------------------------------------------------------------
# quality_gates: (OPTIONAL — all lines below are commented out; uncomment to activate)
#
# Declarative quality gate policy evaluated by sdd-verify after test/build steps.
# Absence of this block is a strict no-op: verify behavior is identical to the
# pre-quality-gates baseline (legacy `rules.verify.coverage_threshold` stays active).
#
# When this block IS declared, `quality_gates.tests.coverage.minimum` supersedes
# `rules.verify.coverage_threshold` for the tests gate coverage check.
#
# Recognised gate slots (4 total):
#   tests        — runs the test suite; optional coverage sub-check
#   lint         — static analysis / linting
#   architecture — structural / dependency rules
#   security     — vulnerability scan
#
# Unknown gate keys at the `quality_gates:` level are silently ignored
# (forward-compatibility with future gate slots).
#
# Per-gate fields:
#   required    boolean  default false   — whether gate failure affects verify outcome
#   on_fail     advisory | halt  default advisory
#               advisory → records WARNING finding; archive not blocked
#               halt     → records BLOCKER finding; archive blocked until fixed or overridden
#               NOTE: on_fail defaults to 'advisory' for ALL gates regardless of required.
#               To get blocking behavior, you MUST declare on_fail: halt explicitly.
#   command     string  absent → gate skipped-with-warning (NOT a failure)
#   timeout_ms  integer > 0  default 120000 — per-gate execution budget; on
#               timeout the gate is recorded as `error` (not a quality fail).
#               Non-positive/non-integer values fall back to the default.
#
# tests gate extra fields:
#   coverage.minimum  number 0-100   absent/invalid → coverage check disabled
#                                    (an invalid value surfaces a validation warning)
#   coverage.command  string         stdout MUST be the coverage % (0-100)
#                                    absent → coverage check skipped-with-warning (not fail)
#                                    out-of-range stdout → skipped-with-warning (NOT clamped)
#
# Gate status values: pass | fail | skipped | error
#   error = the command could not run (ENOENT, permission denied, timeout, or a
#   non-numeric exit code). A required+halt gate that errors blocks archive, same
#   as a fail, but is recorded distinctly in the audit so a tool failure is never
#   silently reported as a quality fail.
#
# SECURITY — gate command trust boundary (mirrors lifecycle hooks `run-command`):
#   `command` and `coverage.command` are executed with FULL privilege by
#   sdd-verify and flow through the existing PreToolUse DENY/ASK evaluation
#   unchanged. They live in committable config (this file) and the verify-report.
#   Treat them as trusted, version-controlled configuration: DO NOT embed secrets,
#   tokens, or credentials inline. Use environment variables or secret-manager
#   references resolved at runtime, and scrutinize gate commands in PR review.
#
#
# (Example configuration block omitted for cleanliness. Refer to sdd-verify documentation.)
# ---------------------------------------------------------------------------
#
# ---------------------------------------------------------------------------
# hooks: (OPTIONAL — all lines below are commented out; uncomment to activate)
#
# Declarative lifecycle hooks fired by the orchestrator at SDD phase boundaries.
# Absence of this block is a strict no-op: route execution is identical to the
# pre-hooks baseline.
#
# Recognised event keys (7 total, in typical firing order):
#   before-change         — before the first phase of any route
#   before-implementation — before sdd-apply is dispatched
#   before-task           — once per sdd-apply invocation (batch)
#   before-commit         — after the last sdd-apply batch, before sdd-verify
#   before-verify         — before sdd-verify is dispatched
#   after-verify          — after sdd-verify completes
#   after-archive         — after sdd-archive completes
#
# Action types: load-skill | load-rules | run-command
# on_failure:   advisory (default, continue) | halt (block + ask user)
#
# (Example configuration block omitted for cleanliness. Refer to lifecycle-hooks documentation.)
# ---------------------------------------------------------------------------
#
# ---------------------------------------------------------------------------
# capabilities: (OPTIONAL — all lines below are commented out; uncomment to activate)
#
# Declared list of project technologies and tools used for stack-skill selection.
# The absent block is a strict no-op: no capability-aware stack skills will be injected.
#
# (Example configuration block omitted for cleanliness. Refer to capability-registry documentation.)
# ---------------------------------------------------------------------------
