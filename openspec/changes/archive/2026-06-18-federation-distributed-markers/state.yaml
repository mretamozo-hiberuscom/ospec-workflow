chain:
  strategy: feature-branch-chain
  order: [WU1, WU2, WU3, WU4, WU5, WU6, WU7]
  slices:
    - id: WU1
      scope: workspace-atlas.js marker read/merge/serialize + loadAtlas regeneration branch + Phase 1 regression baseline
      risk: high
      status: done
    - id: WU2
      scope: federation-marker.js enroll (idempotent, atomic)
      depends_on: [WU1]
      status: done
    - id: WU3
      scope: sdd-init container detection + target_dir via ## Parameters
      depends_on: [WU1]
      status: done
    - id: WU4
      scope: sdd-workspace enroll + explore subcommand
      depends_on: [WU1, WU2]
      status: done
    - id: WU5
      scope: .gitignore, persistence-contract.md, orchestrator note, final verification
      depends_on: [WU1, WU2, WU3, WU4]
      status: done
    - id: WU6
      scope: security fix — path-traversal containment guard (isWithinRoot + scanMemberMarkers boundary)
      depends_on: [WU1, WU4]
      risk: high
      remediates: risk-critical-001
      status: done
    - id: WU7
      scope: hardening — readExistingMarker I/O-vs-absence distinction + physical (realpath) symlink containment in scanMemberMarkers
      depends_on: [WU2, WU4, WU6]
      risk: high
      remediates: [resilience-warning-001, reliability-warning-002, risk-warning-symlink-001]
      status: done
  delivered: true

