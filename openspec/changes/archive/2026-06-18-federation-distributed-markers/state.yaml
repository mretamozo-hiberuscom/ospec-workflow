gates:
  4r-review-gate:
    status: done
    on_blocker: advisory
    findings_summary: "1 CRITICAL, 4 WARNING (3 reliability/resilience + 1 risk), 6 SUGGESTION"
    surfaced_to_user: true
    findings:
      - id: risk-critical-001
        reviewer: review-risk
        severity: CRITICAL
        origin: code-bug
        status: closed
        remediated_by: WU6
        confirmed_by: review-risk re-review (commit 8656fc4) + sdd-verify re-run (357/357)
        summary: >
          Path traversal in member scanning. parseGitmodulesPaths inserts
          .gitmodules `path = ...` values unvalidated into memberDirs; explore →
          enroll then mkdir/writes a marker outside containerRoot (arbitrary file
          write/create). Same root cause enables out-of-tree reads (W: info disclosure).
        affected:
          - scripts/lib/workspace-atlas.js:441
          - scripts/lib/federation-explore.js:216
          - scripts/lib/federation-marker.js:363
        fix_hint: >
          After resolving memberRoot, reject (warn+skip) any path whose
          path.resolve(containerRoot, memberDir) does not start with
          containerRoot + path.sep.
        status: remediated
        remediated_by: WU6
        remediation: >
          Added shared isWithinRoot(containerRoot, candidateAbs) guard in
          workspace-atlas.js and applied it at the single discovery boundary
          (scanMemberMarkers): escaping .gitmodules member paths are warned and
          skipped (fail-open), protecting BOTH the read path (loadMarkerFromMember/
          classifyMember) and the write path (explore -> enroll). Covered by 4 new
          RED-first tests (workspace-atlas.test.js + federation-explore.test.js).
      - id: reliability-warning-001
        reviewer: review-reliability
        severity: WARNING
        origin: tasks-gap
        summary: git integration test non-deterministic (env not isolated; spawnSync exit codes unchecked).
        affected: [scripts/lib/artifact-store.test.js:368]
      - id: resilience-warning-001
        reviewer: review-resilience
        severity: WARNING
        origin: code-bug
        status: closed
        remediated_by: WU7
        confirmed_by: sdd-apply WU7 RED-first tests (federation-marker.test.js) + full native suite 362/362
        summary: >
          readExistingMarker swallows ALL non-ENOENT errors as "corrupt"; a transient
          EACCES/EBUSY read error makes enroll overwrite a healthy marker (data loss).
        affected: [scripts/lib/federation-marker.js:345]
        fix_hint: rethrow when error.code is neither ENOENT nor a parse failure.
        remediation: >
          Split readExistingMarker into a read phase and a parse phase. ENOENT on read
          -> null (absent, write fresh); any other read error (EACCES/EBUSY/EISDIR/lock)
          -> RETHROW so enroll aborts instead of overwriting a healthy marker; parse
          failure on present content -> null (corrupt self-heal rewrite). Covered by 2
          RED-first tests (EACCES data-loss + EISDIR rethrow) plus a green self-heal
          regression test.
      - id: reliability-warning-002
        reviewer: review-reliability
        severity: WARNING
        origin: tasks-gap
        status: closed
        remediated_by: WU7
        confirmed_by: sdd-apply WU7 self-heal regression test (federation-marker.test.js)
        summary: corrupt/empty existing-marker recovery path in enroll has no test.
        affected: [scripts/lib/federation-marker.js:324]
        remediation: >
          Added a green regression test asserting a present-but-unparseable (whitespace)
          marker is rewritten with status "written" (corrupt self-heal path covered).
      - id: risk-warning-symlink-001
        reviewer: review-risk
        severity: WARNING
        origin: code-bug
        status: closed
        remediated_by: WU7
        confirmed_by: sdd-apply WU7 RED-first symlink tests (workspace-atlas.test.js + federation-explore.test.js) + full native suite 362/362
        summary: >
          WU6 containment (isWithinRoot) is purely lexical (path.resolve, not
          fs.realpath). A real symlink planted inside containerRoot whose name does
          not contain ../ passes the check and lets loadMarkerFromMember/enroll
          follow it out of root. Distinct from risk-critical-001 (lexical ../ /
          absolute vector, which is closed). Advisory, non-blocking for C1.
        affected: [scripts/lib/workspace-atlas.js:441]
        fix_hint: resolve with fs.realpath before the containment check, or refuse symlinked member dirs.
        remediation: >
          Added a physical containment guard isRealPathWithinRoot(containerRoot, candidateAbs)
          that resolves the real on-disk path with fs.realpath/fs.lstat and applied it at the
          scanMemberMarkers discovery->use boundary (warn + skip, fail-open). A not-yet-existing
          first-enroll dir (lstat ENOENT) is accepted; a non-symlink entry is accepted; an
          EXISTING symlink escaping or dangling outside the real root is rejected. The lexical
          isWithinRoot ../ /absolute rejection is preserved (no risk-critical-001 regression).
          Both read (loadMarkerFromMember/classifyMember) and write (explore -> enroll) paths
          inherit the guard since both consume scanMemberMarkers. Covered by 2 RED-first tests.
    suggestions_count: 6

