open_decisions:
  - id: AMBIGUITY-A1
    summary: "Detection shape — what writes source:detected entries, what heuristics, which component"
    phase: clarify
    status: resolved
    resolution: >
      source:detected is a forward-compatible schema field only in this change.
      No detection-writing component is implemented. declared = authoritative
      (tooling must not auto-remove); detected = advisory (may be auto-refreshed
      by a future change). Both values resolve stack skills identically.
  - id: AMBIGUITY-A2
    summary: "Task-domain inference — how orchestrator determines frontend vs backend domain for stack-skill filtering"
    phase: clarify
    status: resolved
    resolution: >
      Orchestrator judgment / semantic selection, faithful to ECC. The orchestrator
      reads each candidate skill's description and capabilities frontmatter and weighs
      them against the task content and intent. No domain: field on task entries or
      skill frontmatter. Stack skills must carry a meaningful description field.
      5-skill combined cap (utility + stack) remains the hard guard.
  - id: AMBIGUITY-A3
    summary: "Multi-skill resolution precedence — priority order when a capability maps to multiple stack skills; tie-breaking under five-skill cap"
    phase: clarify
    status: resolved
    resolution: >
      Design-deferrable. Default tie-breaking order is deterministic registry/alphabetical
      order by skill id. With the 2-3 seed skills in v1 (one per technology) this case
      never occurs. A future change adding multiple skills per capability must specify
      an explicit precedence rule.
