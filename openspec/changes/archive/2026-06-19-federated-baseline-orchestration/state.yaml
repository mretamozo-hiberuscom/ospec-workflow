decisions:
  state_architecture: aggregated   # Opción 1: federation-baseline-status.yaml + sequential per-member
  batch0_gate_scope: unified        # single domain-map approval for all brownfield members
  baseline_specs_location: member-local   # {member}/openspec/specs/ via delegated sdd-baseline
  member_failure_policy: continue-log-retry   # mark pending, warn, continue others, manual retry
  parallelization: sequential       # v1 sequential per-member (default, non-contested)
  c2_scope: orchestration+hardening-s1-s3   # includes inherited C1 hardening S1/S3
