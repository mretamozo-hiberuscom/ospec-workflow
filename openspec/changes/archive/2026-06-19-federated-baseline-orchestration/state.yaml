change: federated-baseline-orchestration
program: federation (C2)
depends_on:
  - federation-distributed-markers   # C1 (archived 2026-06-18)
created_at: "2026-06-18"
branch: feat/federated-baseline-orchestration

classification: high-risk
classification_confidence: deterministic
classification_rationale: >
  Orchestrator-level behavior change that delegates sdd-baseline per brownfield
  member repo (resumable). Touches federation orchestration, cross-repo loops,
  and persisted state contracts. Not trivial/small.

route:
  intended_route: standard
  actual_route: standard
  route_rationale: >
    artifact_store.backend is 'openspec' (not workspace-federated), so the
    'federated' route condition does not match. project.status is 'active' and
    baseline.status is 'done', so 'brownfield' does not match. First matching
    route for classification high-risk with project.status: active is 'standard'.
  validated: true
  validation_errors: []

session:
  execution_mode: auto
  delivery_strategy: exception-ok
  reply_language: es

phases:
  explore:
    status: done
    artifact: "openspec/changes/federated-baseline-orchestration/exploration.md"
    completed_at: "2026-06-18T12:00:00Z"
  propose:
    status: done
    artifact: "openspec/changes/federated-baseline-orchestration/proposal.md"
    completed_at: "2026-06-18T13:00:00Z"
