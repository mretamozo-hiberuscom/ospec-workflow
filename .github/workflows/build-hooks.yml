name: Build ospec-hooks

on:
  push:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-hooks.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build-hooks.yml'

# Least privilege: the build only reads the checkout, never writes to the repo.
permissions:
  contents: read

# Supersede in-flight runs for the same ref so pushes don't pile up duplicate work.
concurrency:
  group: build-hooks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: go test
        run: go test ./...

  build:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: amd64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cross-compile ospec-hooks
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p release/dist
          go build -o release/dist/ospec-hooks-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/ospec-hooks

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ospec-hooks-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/dist/**
          if-no-files-found: error
